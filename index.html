function cardsDue(){
  const now=Date.now();
  return allCardsForSRS().filter(o=>{const s=S.srs[o.id];return !s || (s.due||0)<=now;});
}
let srsQueue=[], srsIdx=0;
function renderRevisao(){
  srsQueue=cardsDue(); srsIdx=0;
  const c=document.getElementById("content");
  if(!srsQueue.length){
    c.innerHTML=`<h1 class="ph">🔁 Revisão Espaçada</h1>
      <p class="sub">Repetição espaçada: cada acerto afasta a próxima revisão. Um card é "dominado" quando o intervalo atinge 21 dias ou mais.</p>
      <div class="empty">🎉 Nenhuma revisão pendente! Volte amanhã ou estude novos tópicos para alimentar o baralho.</div>
      <div class="card-grid" style="margin-top:18px">
        <div class="stat-card"><div class="stat-ic">🏆</div><div><b>${masteredCards()}</b><span>cards dominados</span></div></div>
        <div class="stat-card"><div class="stat-ic">🃏</div><div><b>${deckSize()}</b><span>cards no total</span></div></div>
      </div>`;
    return;
  }
  c.innerHTML=`<h1 class="ph">🔁 Revisão Espaçada</h1>
    <p class="sub"><b id="srsLeft">${srsQueue.length}</b> cards para revisar hoje. Avalie sua memória honestamente.</p>
    <div id="srsArea"></div>`;
  showSRSCard();
}
function showSRSCard(){
  const area=document.getElementById("srsArea");
  if(srsIdx>=srsQueue.length){renderRevisao();return;}
  const o=srsQueue[srsIdx];
  const f=o.f;const front=f.front||f.f||f.q||"";const back=f.back||f.b||f.a||"";
  area.innerHTML=`
    <div class="srs-card">
      <div class="srs-tag">${o.mod} · ${o.top}</div>
      <div class="srs-front">${front}</div>
      <div class="srs-back" id="srsBack" style="display:none"><div class="srs-divider"></div>${back}</div>
      <div id="srsShowWrap"><button class="btn" onclick="srsReveal()">Mostrar resposta</button></div>
      <div id="srsRate" style="display:none" class="srs-rate">
        <button class="rate r-again" onclick="rateCard('again')">Errei<small>&lt;1min</small></button>
        <button class="rate r-hard" onclick="rateCard('hard')">Difícil<small>${nextLbl('hard')}</small></button>
        <button class="rate r-good" onclick="rateCard('good')">Bom<small>${nextLbl('good')}</small></button>
        <button class="rate r-easy" onclick="rateCard('easy')">Fácil<small>${nextLbl('easy')}</small></button>
      </div>
    </div>`;
}
function srsReveal(){document.getElementById("srsBack").style.display="block";
  document.getElementById("srsShowWrap").style.display="none";
  document.getElementById("srsRate").style.display="grid";}
function nextLbl(rating){const o=srsQueue[srsIdx];const s=S.srs[o.id]||{ease:2.5,interval:0,reps:0};
  const ni=schedule(s,rating).interval;return ni<1?"<1d":(ni>=21?ni+"d ★":ni+"d");}
function schedule(s,rating){
  let ease=s.ease||2.5, interval=s.interval||0, reps=s.reps||0;
  if(rating==="again"){ease=Math.max(1.3,ease-0.2);interval=0;reps=0;}
  else if(rating==="hard"){ease=Math.max(1.3,ease-0.15);interval=interval<1?1:Math.round(interval*1.2);reps++;}
  else if(rating==="good"){interval=interval<1?1:(reps===0?3:Math.round(interval*ease));reps++;}
  else if(rating==="easy"){ease=ease+0.15;interval=interval<1?3:Math.round(interval*ease*1.3);reps++;}
  return {ease,interval,reps};
}
function rateCard(rating){
  const o=srsQueue[srsIdx];
  const prev=S.srs[o.id]||{ease:2.5,interval:0,reps:0};
  const ns=schedule(prev,rating);
  ns.due=Date.now()+Math.max(0,ns.interval)*86400000 + (ns.interval<1?60000:0);
  const wasMastered=prev.interval>=21; const nowMastered=ns.interval>=21;
  S.srs[o.id]=ns;
  S.revisions=(S.revisions||0)+1;
  addXP(rating==="again"?2:5,"revisão");
  if(nowMastered&&!wasMastered){toast("🏆 Card dominado!");addXP(15,"card dominado");}
  saveState();
  srsIdx++;
  const left=document.getElementById("srsLeft"); if(left)left.textContent=Math.max(0,srsQueue.length-srsIdx);
  showSRSCard();
}

/* ============ EDITOR RICO REUTILIZÁVEL (negrito, cores, colar imagem comprimida) ============ */
function richEditor(id,placeholder,initial){
  return `<div class="rich-wrap">
    <div class="rich-tb">
      <button type="button" class="rtb" onmousedown="event.preventDefault()" onclick="richCmd('${id}','bold')"><b>N</b></button>
      <button type="button" class="rtb" onmousedown="event.preventDefault()" onclick="richColor('${id}','#2563EB')" style="color:#2563EB"><b>A</b></button>
      <button type="button" class="rtb" onmousedown="event.preventDefault()" onclick="richColor('${id}','#DC2626')" style="color:#DC2626"><b>A</b></button>
      <button type="button" class="rtb" onmousedown="event.preventDefault()" onclick="richColor('${id}','var(--text)')" title="Preto/padrão"><b>A</b></button>
      <span class="rtb-hint">Ctrl+V cola imagem (auto-comprimida)</span>
    </div>
    <div class="rich-ed" id="${id}" contenteditable="true" data-ph="${placeholder}"
      oninput="richSync('${id}')" onpaste="richPaste(event,'${id}')">${initial||""}</div>
  </div>`;
}
function richCmd(id,cmd){document.execCommand(cmd,false,null);richSync(id);}
function richColor(id,color){const c=color.indexOf('var(')===0?getComputedStyle(document.body).getPropertyValue('--text').trim()||'#0F172A':color;document.execCommand('foreColor',false,c);richSync(id);}
function richSync(id){const el=document.getElementById(id);if(el&&el.dataset.cb)window[el.dataset.cb](el.innerHTML);}
function richPaste(e,id){
  const items=(e.clipboardData||window.clipboardData).items;
  for(const it of items){
    if(it.type&&it.type.indexOf("image")===0){
      e.preventDefault();const file=it.getAsFile();const rd=new FileReader();
      rd.onload=ev=>compressImage(ev.target.result,720,0.7,dataUrl=>{
        document.execCommand('insertHTML',false,`<img src="${dataUrl}" style="max-width:100%;border-radius:8px;margin:6px 0">`);
        richSync(id);toast("🖼️ Imagem colada e comprimida");});
      rd.readAsDataURL(file);return;
    }
  }
}
function compressImage(src,maxW,quality,cb){
  const img=new Image();img.onload=()=>{
    let w=img.width,h=img.height;if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
    const cv=document.createElement("canvas");cv.width=w;cv.height=h;
    cv.getContext("2d").drawImage(img,0,0,w,h);
    cb(cv.toDataURL("image/jpeg",quality));
  };img.src=src;
}
/* binda callback a um editor (chamado após render) */
function bindRich(id,cb){const el=document.getElementById(id);if(el)el.dataset.cb=cb;}

/* registra dia de estudo (chamado no startApp) */
function markStudyDay(){
  S.studyDays=S.studyDays||[];
  const today=new Date().toDateString();
  if(!S.studyDays.includes(today)){S.studyDays.push(today);if(S.studyDays.length>120)S.studyDays.shift();saveState();}
}
