<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas de Preventiva · Residência Médica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cookie&family=Merriweather:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#14B8A6; --primary2:#0EA5A4; --accent:#D962D9;
  --bg:#0a1118; --bg2:#0f1b24; --card:rgba(20,32,42,.72); --card2:rgba(15,25,33,.55);
  --text:#e8f1f5; --muted:#8aa0ad; --border:rgba(255,255,255,.08);
  --glass:rgba(255,255,255,.04); --glow:rgba(20,184,166,.35);
  --good:#22c55e; --warn:#f59e0b; --bad:#ef4444;
  --shadow:0 20px 50px -12px rgba(0,0,0,.6);
  --font-d:'Cookie',cursive; --font-s:'Merriweather',serif; --font-b:'Inter',sans-serif;
}
[data-theme="light"]{
  --bg:#F2F7FC; --bg2:#e7f0f8; --card:rgba(255,255,255,.78); --card2:rgba(255,255,255,.55);
  --text:#0F172A; --muted:#5b6b78; --border:rgba(15,23,42,.08);
  --glass:rgba(255,255,255,.5); --glow:rgba(20,184,166,.25);
  --shadow:0 20px 50px -12px rgba(40,70,90,.22);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font-b); background:var(--bg); color:var(--text);
  overflow-x:hidden; line-height:1.6; -webkit-font-smoothing:antialiased;
  transition:background .4s,color .4s;
}
/* MESH BACKGROUND */
.mesh{position:fixed;inset:0;z-index:-3;overflow:hidden;background:
  radial-gradient(circle at 15% 20%, var(--glow), transparent 45%),
  radial-gradient(circle at 85% 15%, rgba(217,98,217,.22), transparent 42%),
  radial-gradient(circle at 75% 85%, rgba(14,165,164,.25), transparent 48%),
  radial-gradient(circle at 20% 90%, rgba(217,98,217,.12), transparent 40%),
  linear-gradient(160deg,var(--bg),var(--bg2));
  animation:drift 22s ease-in-out infinite alternate;}
@keyframes drift{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.15) translate(-3%,2%)}}
.mesh::after{content:'';position:absolute;inset:-50%;background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);background-size:38px 38px;animation:drift2 30s linear infinite;}
@keyframes drift2{to{transform:translate(38px,38px)}}
.particles{position:fixed;inset:0;z-index:-2;pointer-events:none}
.particles span{position:absolute;width:4px;height:4px;border-radius:50%;background:var(--primary);opacity:.4;animation:float linear infinite}
@keyframes float{from{transform:translateY(110vh)}to{transform:translateY(-10vh)}}

/* GATE & AUTH */
.overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{background:var(--card);backdrop-filter:blur(22px);border:1px solid var(--border);border-radius:26px;padding:42px 38px;max-width:430px;width:100%;box-shadow:var(--shadow);position:relative;overflow:hidden}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--primary),var(--accent))}
.brand-title{font-family:var(--font-d);font-size:64px;line-height:.9;background:linear-gradient(120deg,var(--primary),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
.brand-sub{font-family:var(--font-s);text-align:center;color:var(--muted);font-size:14px;margin-bottom:26px;letter-spacing:.5px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.field input{width:100%;padding:13px 15px;border-radius:13px;border:1px solid var(--border);background:var(--glass);color:var(--text);font-size:15px;font-family:var(--font-b);transition:.2s}
.field input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--glow)}
.btn{width:100%;padding:14px;border:none;border-radius:13px;background:linear-gradient(120deg,var(--primary),var(--primary2));color:#fff;font-weight:700;font-size:15px;cursor:pointer;transition:.2s;font-family:var(--font-b)}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 26px -8px var(--glow)}
.btn.alt{background:transparent;border:1px solid var(--border);color:var(--text)}
.link{text-align:center;margin-top:16px;font-size:13px;color:var(--muted);cursor:pointer}
.link b{color:var(--primary)}
.err{color:var(--bad);font-size:13px;text-align:center;margin-top:10px;min-height:18px}
.credit{text-align:center;margin-top:22px;font-size:11px;color:var(--muted);font-family:var(--font-s);font-style:italic}
.hidden{display:none!important}

/* APP SHELL */
#app{display:grid;grid-template-columns:248px 1fr;min-height:100vh;transition:grid-template-columns .3s}
#app.collapsed{grid-template-columns:72px 1fr}
.sidebar{background:var(--card);backdrop-filter:blur(20px);border-right:1px solid var(--border);padding:20px 14px;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.sidebar::-webkit-scrollbar{width:5px}.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px}
.logo{font-family:var(--font-d);font-size:38px;line-height:.9;background:linear-gradient(120deg,var(--primary),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;padding:6px 8px 14px;white-space:nowrap}
.collapsed .logo{font-size:26px}
.collapsed .nav-txt,.collapsed .logo-sub{display:none}
.logo-sub{font-family:var(--font-s);font-size:11px;color:var(--muted);padding:0 8px 14px;margin-top:-12px}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:12px;cursor:pointer;color:var(--muted);font-weight:500;font-size:14px;transition:.18s;white-space:nowrap}
.nav-item:hover{background:var(--glass);color:var(--text)}
.nav-item.active{background:linear-gradient(120deg,var(--glow),transparent);color:var(--text);font-weight:600}
.nav-item.active .nav-ic{filter:drop-shadow(0 0 6px var(--primary))}
.nav-ic{width:20px;text-align:center;font-size:16px;flex-shrink:0}

.main{display:flex;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;gap:14px;padding:14px 26px;border-bottom:1px solid var(--border);background:var(--card2);backdrop-filter:blur(14px);position:sticky;top:0;z-index:20}
.burger{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px}
.search{flex:1;max-width:480px;position:relative}
.search input{width:100%;padding:10px 14px 10px 38px;border-radius:12px;border:1px solid var(--border);background:var(--glass);color:var(--text);font-family:var(--font-b);font-size:14px}
.search input:focus{outline:none;border-color:var(--primary)}
.search::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.6}
.search-results{position:absolute;top:46px;left:0;right:0;background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);max-height:340px;overflow-y:auto;z-index:50}
.search-results .sr{padding:11px 16px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--border)}
.search-results .sr:hover{background:var(--glass)}
.search-results .sr small{color:var(--muted);display:block;font-size:11px}
.tb-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.icon-btn{background:var(--glass);border:1px solid var(--border);width:38px;height:38px;border-radius:11px;cursor:pointer;color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;transition:.2s}
.icon-btn:hover{border-color:var(--primary)}
.avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(120deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;cursor:pointer}
.xp-pill{display:flex;align-items:center;gap:8px;background:var(--glass);border:1px solid var(--border);padding:6px 13px;border-radius:30px;font-size:13px;font-weight:600}
.xp-pill .lv{background:linear-gradient(120deg,var(--primary),var(--accent));color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px}
.streak-pill{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:var(--warn)}

.content{padding:30px;max-width:1180px;width:100%;margin:0 auto;flex:1}
.page{animation:fadeUp .4s ease both}
/* status de conteúdo */
.status-pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;margin-left:6px}
.st-done{background:rgba(20,184,166,.18);color:var(--primary);border:1px solid var(--primary)}
.st-wip{background:rgba(217,98,217,.15);color:var(--accent);border:1px solid var(--accent)}
.st-part{background:rgba(245,158,11,.16);color:#f59e0b;border:1px solid #f59e0b}
/* editor rico */
.rich-wrap{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--bg)}
.rich-tb{display:flex;align-items:center;gap:4px;padding:6px 8px;background:rgba(217,98,217,.08);border-bottom:1px solid var(--border);flex-wrap:wrap}
.rtb{width:30px;height:28px;border:1px solid var(--border);border-radius:7px;background:var(--card);cursor:pointer;font-size:14px}
.rtb:hover{border-color:var(--accent)}
.rtb-hint{font-size:11px;color:var(--muted);margin-left:6px}
.rich-ed{min-height:70px;padding:11px 13px;font-size:14px;line-height:1.6;color:var(--text);outline:none}
.rich-ed:empty:before{content:attr(data-ph);color:var(--muted)}
.rich-ed img{max-width:100%}
/* panes estilizados (abas antes "soltas") */
.pane{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:0 0 16px;overflow:hidden;margin-bottom:14px}
.pane-pink{border-color:rgba(217,98,217,.4)}
.pane-bar{background:linear-gradient(90deg,rgba(20,184,166,.16),rgba(217,98,217,.16));padding:11px 16px;font-weight:800;font-size:14px;color:var(--text);border-bottom:1px solid var(--border);font-family:Merriweather,serif}
.pane-pink .pane-bar{background:linear-gradient(90deg,rgba(217,98,217,.2),rgba(217,98,217,.05))}
.pane .teach,.pane>div:not(.pane-bar){padding-left:16px;padding-right:16px}
.pane .teach{padding-top:14px}
/* fluxograma visão fixa */
.flow-panel{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px}
.flow-panel .pane-bar{margin-bottom:0}
/* fluxograma fixo: caixas + setas */
.ff-chart{padding:16px;display:flex;flex-direction:column;align-items:stretch}
.ff-box{background:var(--bg2);border:1.5px solid var(--primary);border-radius:12px;padding:12px 14px;color:var(--text)}
.ff-box.end{border-color:#16a34a;background:rgba(22,163,74,.10)}
.ff-box.q{border-left:5px solid var(--accent)}
.ff-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ff-num{display:inline-grid;place-items:center;width:22px;height:22px;border-radius:50%;background:var(--primary);color:#fff;font-size:12px;font-weight:800}
.ff-box.end .ff-num{background:#16a34a}
.ff-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.ff-text{font-size:14px;line-height:1.5;color:var(--text)}
.ff-opts{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.ff-branch{font-size:12.5px;color:var(--muted);background:var(--glass);padding:4px 9px;border-radius:8px}
.ff-branch b{color:var(--primary)}
.ff-arrow{text-align:center;color:var(--accent);font-size:20px;line-height:1;margin:3px 0;font-weight:700}
.ff-inter{padding:14px}
.deck-item{display:flex;flex-direction:column}
.srs-rate{display:flex;gap:5px;margin-top:8px}
.srs-b{flex:1;padding:7px 4px;border-radius:9px;border:none;cursor:pointer;font-weight:700;font-size:12px;color:#fff}
.srs-b.again{background:#e2574c}.srs-b.hard{background:#e8932f}.srs-b.good{background:var(--primary)}.srs-b.easy{background:#16a34a}
.srs-b:hover{filter:brightness(1.1)}
.srs-mast{text-align:center;font-size:11px;color:var(--primary);margin-top:5px;font-weight:700}
.srs-mast.next{color:var(--muted)}
.flow-restart{background:var(--accent);color:#fff;border:none;padding:7px 14px;border-radius:9px;cursor:pointer;font-weight:700;font-size:13px}
.flow-restart.sm{padding:5px 11px;font-size:12px}
.flow-panel .flow-node{margin:0 14px 12px}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
h1.ph{font-family:var(--font-s);font-size:30px;font-weight:900;margin-bottom:4px}
.ph-sub{color:var(--muted);margin-bottom:26px;font-size:15px}
.section-bar{display:inline-block;font-family:var(--font-s);font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:1px;padding:6px 14px;border-radius:8px;background:linear-gradient(120deg,var(--primary),var(--primary2));color:#fff;margin:24px 0 14px}
.section-bar.acc{background:linear-gradient(120deg,var(--accent),#b347b3)}

.grid{display:grid;gap:18px}
.g2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.g3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.g4{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
.card{background:var(--card);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:18px;padding:22px;box-shadow:var(--shadow);transition:.25s}
.card.hov:hover{transform:translateY(-4px);border-color:var(--primary)}
.stat{text-align:center}
.stat .v{font-family:var(--font-s);font-size:34px;font-weight:900;background:linear-gradient(120deg,var(--primary),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.stat .l{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.6px;margin-top:4px}

.progress{height:9px;background:var(--glass);border-radius:30px;overflow:hidden;border:1px solid var(--border)}
.progress>i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:30px;transition:width .8s}

.mod-card{cursor:pointer;position:relative;overflow:hidden}
.mod-card .badge{position:absolute;top:14px;right:14px;font-size:11px;padding:3px 9px;border-radius:20px;background:var(--glass);border:1px solid var(--border);color:var(--muted)}
.mod-card .badge.flag{background:linear-gradient(120deg,var(--accent),#b347b3);color:#fff;border:none}
.mod-card h3{font-family:var(--font-s);font-size:18px;margin-bottom:6px;padding-right:60px}
.mod-card .meta{color:var(--muted);font-size:13px;margin-bottom:14px}

.chip{display:inline-block;padding:5px 12px;border-radius:20px;background:var(--glass);border:1px solid var(--border);font-size:12px;font-weight:600;margin:3px}
.chip.on{background:var(--primary);color:#fff;border:none}

/* TOPIC TABS */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin:18px 0;border-bottom:1px solid var(--border);padding-bottom:12px}
.tab{padding:8px 15px;border-radius:11px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);border:1px solid transparent;transition:.18s;white-space:nowrap}
.tab:hover{background:var(--glass)}
.tab.active{background:var(--card);border-color:var(--border);color:var(--text);box-shadow:0 4px 12px -4px rgba(0,0,0,.3)}
.tab.active:nth-child(even){border-color:var(--accent)}
.subtabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.subtab{padding:7px 13px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);background:var(--glass);border:1px solid var(--border);transition:.18s}
.subtab.active{background:linear-gradient(120deg,var(--primary),var(--primary2));color:#fff;border:none}
.subtab:nth-child(even).active{background:linear-gradient(120deg,var(--accent),#b347b3)}

.teach{font-size:15.5px;line-height:1.85}
.teach h3{font-family:var(--font-s);font-size:21px;margin:26px 0 10px;color:var(--text);border-left:4px solid var(--primary);padding-left:12px}
.teach h4{font-family:var(--font-s);font-size:17px;margin:18px 0 8px;color:var(--primary)}
.teach p{margin-bottom:13px}
.teach ul,.teach ol{margin:10px 0 14px 22px}
.teach li{margin-bottom:7px}
.teach strong{color:var(--accent)}
.teach .box{background:var(--glass);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:0 12px 12px 0;padding:14px 18px;margin:16px 0}
.teach .box.warn{border-left-color:var(--warn)}
.teach .box.tip{border-left-color:var(--good)}
.teach .box b{color:var(--text)}
.teach svg{max-width:100%;height:auto;display:block;margin:18px auto;border-radius:14px;background:var(--card2);padding:10px}
.teach table,.tbl{width:100%;border-collapse:collapse;margin:16px 0;font-size:14px;background:var(--card2);border-radius:12px;overflow:hidden}
.teach th,.tbl th{background:linear-gradient(120deg,var(--primary),var(--primary2));color:#fff;padding:11px 13px;text-align:left;font-size:13px}
.teach td,.tbl td{padding:10px 13px;border-top:1px solid var(--border);vertical-align:top}
.tbl tr:nth-child(even) td{background:var(--glass)}

.fc-fixed{background:var(--card2);border:1px dashed var(--primary);border-radius:14px;padding:16px;margin:22px 0}
.fc-fixed h4{font-size:14px;margin-bottom:10px;color:var(--primary)}
.fc-fixed .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.fc-fixed input,.fc-fixed textarea,.fc-fixed select{flex:1;min-width:140px;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--glass);color:var(--text);font-family:var(--font-b);font-size:14px}
.fc-fixed textarea{min-height:60px;resize:vertical}

/* QUESTIONS */
.q{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px}
.q .stem{font-weight:500;margin-bottom:14px;line-height:1.7}
.opt{display:block;padding:11px 15px;border:1px solid var(--border);border-radius:11px;margin-bottom:8px;cursor:pointer;transition:.16s;font-size:14px}
.opt:hover{border-color:var(--primary)}
.opt.correct{background:rgba(34,197,94,.15);border-color:var(--good)}
.opt.wrong{background:rgba(239,68,68,.15);border-color:var(--bad)}
.expl{margin-top:12px;padding:14px;background:var(--glass);border-radius:11px;border-left:4px solid var(--primary);font-size:14px;line-height:1.7;display:none}
.expl.show{display:block;animation:fadeUp .3s}
/* garantir cor de texto correta em ambos os temas */
.opt,.qopt,.expl,.qexpl,.q .stem,.teach,.pane .teach,.case,.fc-fixed,button.qopt:disabled{color:var(--text)}
.qopt:disabled{opacity:1}
.teach p,.teach li,.teach td,.pane td,.pane p,.pane li{color:var(--text)}

/* FLASHCARD */
.deck{max-width:480px;margin:0 auto}
.flashcard{perspective:1400px;height:240px;cursor:pointer;margin-bottom:14px}
.flashcard .inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d}
.flashcard.flipped .inner{transform:rotateY(180deg)}
.flashcard .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;padding:26px;display:flex;align-items:center;justify-content:center;text-align:center;background:var(--card);border:1px solid var(--border);font-size:17px;box-shadow:var(--shadow);overflow:auto}
.flashcard .face.back{transform:rotateY(180deg);background:linear-gradient(150deg,var(--card),var(--card2));border-color:var(--primary)}
.srs-row{display:flex;gap:8px;justify-content:center;margin-top:6px}
.srs-row button{flex:1;padding:11px;border-radius:11px;border:none;color:#fff;font-weight:700;cursor:pointer;font-size:13px;transition:.2s}
.srs-row button:hover{transform:translateY(-2px)}
.srs-erro{background:var(--bad)}.srs-dif{background:var(--warn)}.srs-bom{background:var(--primary)}.srs-facil{background:var(--good)}

/* CASE */
.case-card{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px}
.case-card h4{font-family:var(--font-s);font-size:18px;margin-bottom:10px}
.case-seg{margin-bottom:10px}
.case-seg b{color:var(--primary);display:block;font-size:13px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.reveal{filter:blur(6px);transition:.3s;cursor:pointer;user-select:none}
.reveal.shown{filter:none}

/* FLOW */
.flow-node{background:var(--card2);border:1px solid var(--border);border-radius:13px;padding:14px 18px;margin:10px auto;max-width:560px;text-align:center}
.flow-node.q{border-color:var(--accent)}
.flow-node.end{border-color:var(--good);background:rgba(34,197,94,.1)}
.flow-opts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.flow-opts button{padding:8px 16px;border-radius:10px;border:1px solid var(--primary);background:var(--glass);color:var(--text);cursor:pointer;font-weight:600;font-size:13px}
.flow-opts button:hover{background:var(--primary);color:#fff}
.flow-arrow{text-align:center;color:var(--muted);font-size:20px}

/* MINDMAP */
.mind{display:flex;flex-direction:column;align-items:center;gap:16px}
.mind-center{font-family:var(--font-s);font-size:22px;font-weight:900;padding:14px 30px;border-radius:16px;background:linear-gradient(120deg,var(--primary),var(--accent));color:#fff;box-shadow:var(--shadow)}
.mind-branches{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.mind-branch{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:14px;min-width:180px;max-width:230px}
.mind-branch h5{font-size:14px;margin-bottom:8px;color:var(--primary);display:flex;gap:6px;align-items:center}
.mind-branch ul{list-style:none;font-size:12.5px}
.mind-branch li{padding:4px 0;border-top:1px dashed var(--border);color:var(--muted)}

/* CHECKLIST */
.chk{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--card2);border:1px solid var(--border);border-radius:12px;margin-bottom:9px;cursor:pointer;transition:.18s}
.chk:hover{border-color:var(--primary)}
.chk .box-i{width:24px;height:24px;border-radius:7px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;transition:.2s}
.chk.done .box-i{background:var(--good);border-color:var(--good);color:#fff}
.chk.done span{text-decoration:line-through;color:var(--muted)}

textarea.notes{width:100%;min-height:200px;padding:16px;border-radius:14px;border:1px solid var(--border);background:var(--glass);color:var(--text);font-family:var(--font-b);font-size:15px;line-height:1.7;resize:vertical}

/* CITY MAP GAMIFICATION */
.city-wrap{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:18px;position:relative;overflow:hidden}
.city-glow{position:absolute;inset:0;background:radial-gradient(circle at 50% 60%,var(--glow),transparent 60%);opacity:.5;pointer-events:none}
.city-rank{font-family:var(--font-s);font-size:20px;font-weight:900;text-align:center;margin-bottom:4px;background:linear-gradient(120deg,var(--primary),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.ind-row{display:flex;justify-content:space-between;font-size:13px;margin:7px 0;gap:10px}
.ind-row .ind-bar{flex:1;align-self:center}

.radar-wrap{display:flex;justify-content:center}
.career-step{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;margin-bottom:7px;background:var(--card2);border:1px solid var(--border);opacity:.45;transition:.3s}
.career-step.reached{opacity:1;border-color:var(--primary)}
.career-step.current{background:linear-gradient(120deg,var(--glow),transparent);border-color:var(--accent)}
.career-step .ico{font-size:22px}
.ach{display:flex;align-items:center;gap:12px;padding:14px;border-radius:14px;background:var(--card2);border:1px solid var(--border);opacity:.4;filter:grayscale(1);transition:.3s}
.ach.unlocked{opacity:1;filter:none;border-color:var(--primary)}
.ach .ico{font-size:30px}
.ach h5{font-size:14px}.ach small{color:var(--muted);font-size:12px}

.toast{position:fixed;bottom:26px;right:26px;background:var(--card);backdrop-filter:blur(16px);border:1px solid var(--primary);border-radius:14px;padding:14px 20px;box-shadow:var(--shadow);z-index:200;animation:fadeUp .3s;font-weight:600;display:flex;align-items:center;gap:10px}

.lema{font-family:var(--font-s);font-style:italic;text-align:center;color:var(--muted);font-size:15px;margin:18px 0}

/* ===== ENGINE5 COMPONENTS ===== */
.sub{color:var(--muted);font-size:15px;margin:-4px 0 18px;max-width:760px;line-height:1.5}
.muted{color:var(--muted);font-size:13px}
.empty{padding:40px;text-align:center;color:var(--muted);background:var(--card);border:1px dashed var(--border);border-radius:16px;font-size:15px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin:12px 0}
.stat-card{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 18px;backdrop-filter:blur(10px)}
.stat-card .stat-ic{font-size:26px}
.stat-card b{font-size:22px;display:block;font-family:var(--font-s)}
.stat-card span{font-size:12px;color:var(--muted)}
.topic-card{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;cursor:pointer;transition:.2s}
.topic-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:var(--shadow)}
.topic-card .tc-ic{font-size:24px}
.topic-card b{display:block;font-size:15px}.topic-card span{font-size:12px;color:var(--muted)}

/* flip cards */
.flip{height:170px;perspective:1100px;cursor:pointer}
.flip-in{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d}
.flip.flipped .flip-in{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;padding:18px;display:flex;flex-direction:column;justify-content:center;border:1px solid var(--border);box-shadow:var(--shadow)}
.flip-front{background:var(--card)}
.flip-back{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;transform:rotateY(180deg)}
.flip-tag{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);font-weight:700;margin-bottom:8px}
.flip-txt{font-size:14px;line-height:1.45}
.flip-hint{position:absolute;bottom:10px;right:14px;font-size:10px;color:var(--muted)}

/* journey */
.journey-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin:12px 0}
@media(max-width:820px){.journey-grid{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;backdrop-filter:blur(10px)}
.panel-h{font-family:var(--font-s);font-weight:700;margin-bottom:12px;font-size:16px}
.citywrap svg,.radarwrap svg{width:100%;height:auto}
.career-track{display:grid;gap:8px;margin:10px 0}
.career-step{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:14px;background:var(--card);border:1px solid var(--border);opacity:.55}
.career-step.reached{opacity:1;border-color:var(--primary)}
.career-step.current{background:linear-gradient(135deg,rgba(20,184,166,.15),rgba(217,98,217,.12));border-color:var(--accent)}
.career-dot{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:var(--bg2);border:2px solid var(--border);font-size:14px;color:var(--accent)}
.career-step.reached .career-dot{background:var(--primary);color:#fff;border-color:var(--primary)}
.career-info b{display:block}.career-info span{font-size:12px;color:var(--muted)}
.ind-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}

/* metas */
.goal-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px}
.goal-card.done{border-color:var(--primary)}
.goal-h{font-family:var(--font-s);font-weight:700;font-size:16px;margin-bottom:6px}
.goal-card p{font-size:13px;color:var(--muted);margin:0 0 12px}
.goal-bar{height:9px;background:var(--bg2);border-radius:6px;overflow:hidden;margin-bottom:12px}
.goal-bar>div{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:6px;transition:width .5s}
.streak-big{font-size:30px;font-family:var(--font-s);font-weight:700}.streak-big span{font-size:14px;color:var(--muted)}
.cal-grid{display:grid;grid-template-columns:repeat(14,1fr);gap:6px;max-width:520px}
.cal-cell{aspect-ratio:1;border-radius:5px;background:var(--bg2);border:1px solid var(--border)}
.cal-cell.on{background:linear-gradient(135deg,var(--primary),var(--accent));border-color:transparent}

/* temas */
.temas-list{display:grid;gap:10px}
.tema-card{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 18px}
.tema-inc{color:#f5b301;font-size:15px;letter-spacing:2px;min-width:90px}
.tema-body b{display:block}.tema-body span{font-size:13px;color:var(--muted)}

/* notas */
.note-block{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.note-h{font-family:var(--font-s);font-weight:700;margin-bottom:8px}
.note-body{font-size:14px;line-height:1.5;margin-bottom:10px}

/* SRS */
.srs-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:30px;max-width:640px;margin:0 auto;box-shadow:var(--shadow)}
.srs-tag{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);font-weight:700;margin-bottom:16px}
.srs-front{font-size:19px;font-weight:600;line-height:1.5}
.srs-divider{height:1px;background:var(--border);margin:18px 0}
.srs-back{font-size:16px;line-height:1.55;color:var(--text)}
.srs-rate{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:22px}
.rate{padding:12px 8px;border-radius:12px;border:none;cursor:pointer;font-weight:700;color:#fff;display:flex;flex-direction:column;gap:3px;font-size:14px}
.rate small{font-weight:500;opacity:.85;font-size:10px}
.r-again{background:#e2574c}.r-hard{background:#e8923b}.r-good{background:#3aa66b}.r-easy{background:#3478c2}
.srs-card .btn{margin-top:22px}

/* conquistas */
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.ach-card{position:relative;display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px}
.ach-card.locked{opacity:.5}
.ach-card.on{border-color:var(--accent);background:linear-gradient(135deg,rgba(20,184,166,.1),rgba(217,98,217,.08))}
.ach-ic{font-size:28px}
.ach-body b{font-size:14px}
.ach-badge{position:absolute;top:10px;right:12px;color:var(--primary);font-weight:800}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px}
.qmeta{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);font-weight:700;margin-bottom:8px}
.qtext{font-weight:600;margin-bottom:12px;line-height:1.5}
.qopts{display:grid;gap:8px}
.qopt{text-align:left;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;font-size:14px;transition:.15s;color:var(--text);font-family:var(--font-b)}
.qopt:hover:not(:disabled){border-color:var(--primary)}
.qopt.correct{background:rgba(58,166,107,.18);border-color:#3aa66b}
.qopt.wrong{background:rgba(226,87,76,.16);border-color:#e2574c}
.qexp{margin-top:12px;padding:12px 14px;background:var(--bg2);border-left:3px solid var(--primary);border-radius:8px;font-size:13px;line-height:1.5}

.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--primary)}

@media(max-width:820px){#app{grid-template-columns:0 1fr}.sidebar{position:fixed;z-index:60;left:-260px;width:248px;transition:left .3s}#app.mobopen .sidebar{left:0}.content{padding:18px}.srs-rate{grid-template-columns:repeat(2,1fr)}.cal-grid{grid-template-columns:repeat(7,1fr)}}
</style>
</head>

window.MOD_SUS = {
  id:"M1", t:"Sistema Único de Saúde (SUS)", ic:"🏛️", flag:true,

  topics:[

      teach:`<h3>Entendendo do zero</h3>
<p>Imagine que, antes de 1988, a saúde no Brasil funcionava como um <strong>clube fechado</strong>: só tinha acesso a hospitais e médicos quem tinha "carteira assinada" e contribuía para a Previdência. Quem não trabalhava formalmente — desempregados, trabalhadores rurais, donas de casa — dependia da <b>caridade</b> (Santas Casas) ou simplesmente não tinha atendimento. A saúde era <b>mercadoria</b>, não direito.</p>
<p>O SUS nasceu para virar essa lógica de cabeça para baixo: transformar saúde de um <strong>privilégio de quem paga</strong> em um <strong>direito de todo cidadão</strong>, financiado por impostos. É como trocar um pedágio na entrada do hospital por uma estrada pública e gratuita.</p>
<div class="box tip"><b>Analogia da prova:</b> pense no SUS como o "Bolsa Família da saúde" no sentido de universalização — só que sem cadastro nem renda exigida. Basta ser pessoa em território nacional.</div>
${SVG_LINHA_TEMPO}
<h3>O modelo antes do SUS — o sanitarismo campanhista e o previdenciário</h3>
<p>No início do século XX, a saúde pública era <strong>campanhista</strong>: ações verticais e autoritárias de combate a epidemias (febre amarela, varíola), simbolizadas por Oswaldo Cruz e a <b>Revolta da Vacina (1904)</b>. Não havia assistência individual organizada pelo Estado.</p>
<p>Em <strong>1923, a Lei Eloy Chaves</strong> criou as <b>CAPs (Caixas de Aposentadoria e Pensões)</b>, por empresa — o embrião da previdência. Depois vieram os <b>IAPs (Institutos)</b>, por categoria profissional (1930s). Em <strong>1966</strong>, a ditadura unificou tudo no <b>INPS</b>, e em 1977 criou o <b>INAMPS</b>, responsável pela assistência médica dos contribuintes.</p>
<p>Características desse modelo (que a prova adora contrastar com o SUS):</p>
<ul><li><b>Excludente:</b> só cobria o trabalhador formal urbano (cidadania regulada).</li><li><b>Curativo e hospitalocêntrico:</b> foco em doença, não em prevenção.</li><li><b>Privatista:</b> comprava serviços do setor privado (lógica de "produção de serviços").</li><li><b>Centralizado e fragmentado:</b> Ministério da Saúde (ações coletivas) separado do INAMPS (assistência individual).</li></ul>
<h3>O Movimento da Reforma Sanitária</h3>
<p>Nos anos 1970–80, em plena ditadura, um movimento de sanitaristas, acadêmicos (CEBES, ABRASCO), profissionais e movimentos sociais passou a defender a saúde como <strong>questão política e direito de cidadania</strong>. Esse é o <b>Movimento da Reforma Sanitária Brasileira (MRSB)</b>.</p>
<div class="box"><b>Conceito-chave:</b> a Reforma Sanitária não pedia só "mais hospitais". Defendia uma <b>concepção ampliada de saúde</b> — saúde como resultado de condições de vida (moradia, trabalho, alimentação, lazer, renda). Isso vira lei depois, na Lei 8.080.</div>
<h3>A 8ª Conferência Nacional de Saúde (1986)</h3>
<p>Marco absoluto. Pela primeira vez com ampla participação popular, a <strong>8ª CNS</strong> consolidou três bandeiras que viram a espinha dorsal do SUS:</p>
<ol><li><b>Conceito ampliado de saúde</b> (determinantes sociais).</li><li><b>Saúde como direito de todos e dever do Estado.</b></li><li><b>Criação de um Sistema Único de Saúde</b>, universal, descentralizado e com participação popular.</li></ol>
<p>O relatório da 8ª CNS foi a <strong>base do texto constitucional</strong>. Logo depois, a <b>Comissão Nacional da Reforma Sanitária</b> e o <b>SUDS (1987)</b> serviram de "ponte" até a Constituição.</p>
<h3>A Constituição de 1988 — a "Constituição Cidadã"</h3>
<p>A CF/88 inscreveu a saúde nos <strong>artigos 196 a 200</strong>. Memorize o art. 196, quase sempre cobrado:</p>
<div class="box"><b>Art. 196 (essência):</b> "A saúde é <b>direito de todos e dever do Estado</b>, garantido mediante <b>políticas sociais e econômicas</b> que visem à redução do risco de doença e ao <b>acesso universal e igualitário</b> às ações e serviços para sua promoção, proteção e recuperação."</div>
<ul>
<li><b>Art. 197:</b> ações e serviços de saúde são de <b>relevância pública</b>; o Estado regula, fiscaliza e controla. Execução direta ou por terceiros.</li>
<li><b>Art. 198:</b> as ações compõem uma <b>rede regionalizada e hierarquizada</b>, constituindo um sistema único, organizado por: <b>descentralização (comando único)</b>, <b>atendimento integral (prioridade preventiva)</b> e <b>participação da comunidade</b>. Define o financiamento (EC 29 e EC 86).</li>
<li><b>Art. 199:</b> a <b>iniciativa privada é livre</b>; pode participar do SUS de forma <b>complementar</b> (preferência a filantrópicas/sem fins lucrativos). Veda destinação de recursos públicos a auxílio de instituições privadas com fins lucrativos. Veda capital estrangeiro (com exceções legais).</li>
<li><b>Art. 200:</b> competências do SUS — vigilância sanitária e epidemiológica, saúde do trabalhador, controle de alimentos/água, sangue/hemoderivados, formação de recursos humanos, meio ambiente, insumos e medicamentos.</li>
</ul>
<div class="box warn"><b>Pegadinha clássica:</b> "acesso universal e <b>igualitário</b>" está na CF/88 (art. 196). Já a <b>equidade</b> aparece como princípio na <b>Lei 8.080</b> (igualdade da assistência). A banca troca os termos para confundir.</div>
<h3>Determinantes sociais — o "porquê" da concepção ampliada</h3>
<p>A saúde de uma população depende muito mais de <strong>condições de vida</strong> do que de leitos hospitalares. O modelo de <b>Dahlgren e Whitehead</b> (camadas) e a <b>Comissão de Determinantes Sociais (CNDSS, 2008)</b> são a base teórica. Isso justifica intersetorialidade: saúde se faz também com saneamento, educação e renda — exatamente o que a Reforma Sanitária pregava.</p>`,

window.MOD_SUS.topics.push(
  {
    id:"sus-leis", t:"Leis Orgânicas: 8.080 e 8.142",
    CONTENT:{
      subtopics:[{id:"s1",t:"Lei 8.080 — organização e funções"},{id:"s2",t:"Princípios e diretrizes legais"},{id:"s3",t:"Lei 8.142 — participação e financiamento"},{id:"s4",t:"Conselhos e Conferências"}],
      teach:`<h3>Entendendo do zero</h3>
<p>A Constituição disse "o SUS existe e é direito de todos" — mas <strong>não explicou como ele funciona no dia a dia</strong>. Quem faz o quê? Quem manda? De onde vem o dinheiro? Como o povo participa? É como ter a <b>planta de uma casa</b> (CF/88) e precisar do <b>manual de instruções</b> para construir e morar nela. Esse manual são as <strong>Leis Orgânicas da Saúde (LOS)</strong>, de 1990.</p>
<div class="box tip"><b>Macete:</b> são <b>duas</b> leis. <b>8.080 = "Organização"</b> (estrutura, princípios, funções, competências). <b>8.142 = "Participação + Pão (dinheiro)"</b> (conselhos/conferências e transferências financeiras). A 8.142 surgiu porque o presidente <b>vetou</b> os trechos sobre participação social e financiamento da 8.080.</div>
<h3>Lei 8.080/90 — a lei da organização</h3>
<p>Dispõe sobre as condições para promoção, proteção e recuperação da saúde, a organização e o funcionamento dos serviços. Pontos cobradíssimos:</p>
<h4>Conceito ampliado de saúde (art. 3º)</h4>
<p>A lei afirma que a saúde tem como <strong>determinantes e condicionantes</strong>, entre outros, <b>alimentação, moradia, saneamento básico, meio ambiente, trabalho, renda, educação, transporte, lazer e acesso a bens e serviços essenciais</b>. Aqui está, escrita em lei, a tese da Reforma Sanitária.</p>
<h4>Princípios e diretrizes (art. 7º)</h4>
${SVG_PRINCIPIOS}
<p>O art. 7º lista os princípios. Os mais cobrados:</p>
<ul>
<li><b>Universalidade</b> de acesso em todos os níveis.</li>
<li><b>Integralidade</b> de assistência: conjunto articulado de ações preventivas e curativas, individuais e coletivas, em todos os níveis de complexidade.</li>
<li><b>Igualdade</b> da assistência, <b>sem preconceitos ou privilégios</b> → na prática operacionalizada como <strong>EQUIDADE</strong> (tratar os desiguais conforme suas necessidades).</li>
<li><b>Direito à informação</b> sobre sua saúde.</li>
<li><b>Autonomia</b> na defesa da integridade física e moral.</li>
<li><b>Participação da comunidade.</b></li>
<li><b>Descentralização</b> com direção única em cada esfera.</li>
<li><b>Regionalização e hierarquização</b> da rede.</li>
<li><b>Resolutividade</b>, <b>intersetorialidade</b>, <b>conjugação de recursos.</b></li>
</ul>
<div class="box warn"><b>Pegadinha de ouro:</b> a Lei 8.080 fala em <b>"igualdade da assistência sem preconceitos ou privilégios"</b>. O conceito de <b>EQUIDADE</b> (tratar desigualmente os desiguais) é a interpretação doutrinária desse princípio — bancas usam os dois termos. Universalidade ≠ equidade ≠ integralidade: saiba separar.</div>
<div class="box"><b>Princípios DOUTRINÁRIOS</b> (o "o quê"): Universalidade, Integralidade, Equidade. &nbsp; <b>Princípios ORGANIZATIVOS</b> (o "como"): Descentralização, Regionalização, Hierarquização, Participação social, Resolutividade.</div>
<h4>Direção e competências (arts. 9º, 15-19)</h4>
<p>Direção <b>única</b> em cada esfera: <b>União → Ministério da Saúde</b>; <b>Estado → Secretaria Estadual</b>; <b>Município → Secretaria Municipal</b>. O município é o principal responsável pela <b>execução</b> das ações (descentralização com municipalização).</p>
<div class="box tip"><b>Atualização (Lei 13.097/2015 e debates recentes):</b> houve flexibilização da participação de capital estrangeiro em algumas situações (ex.: hospitais), tema que aparece em provas mais recentes. Mas a regra geral constitucional de complementaridade do privado permanece.</div>
<h3>Lei 8.142/90 — participação e financiamento</h3>
<h4>Instâncias colegiadas de participação social (art. 1º)</h4>
<p>Em cada esfera de governo existem duas instâncias:</p>
<table><tr><th>Instância</th><th>Periodicidade</th><th>Composição (paritária)</th><th>Função</th></tr>
<tr><td><b>Conferência de Saúde</b></td><td>A cada <b>4 anos</b></td><td>50% usuários · 25% trabalhadores · 25% gestores/prestadores</td><td>Avaliar e propor <b>diretrizes</b> da política de saúde</td></tr>
<tr><td><b>Conselho de Saúde</b></td><td><b>Permanente</b></td><td>50% usuários · 25% trabalhadores · 25% gestores/prestadores</td><td>Caráter <b>deliberativo</b>; formula estratégias e <b>controla a execução</b>, inclusive financeira</td></tr></table>

<h4>Financiamento e transferências (arts. 2º a 4º)</h4>
<p>Os recursos do <b>Fundo Nacional de Saúde (FNS)</b> são repassados de forma <b>regular e automática (fundo a fundo)</b> a estados e municípios. Para receber, o ente deve ter: <b>Fundo de Saúde</b>, <b>Conselho de Saúde</b>, <b>Plano de Saúde</b>, <b>Relatório de Gestão</b>, contrapartida orçamentária e <b>Plano de Carreira</b>.</p>
<div class="box tip"><b>Mnemônico dos requisitos da 8.142:</b> "<b>FUN-CO-PLA-RE</b>" → <b>FUN</b>do, <b>CO</b>nselho, <b>PLA</b>no, <b>RE</b>latório de gestão (+ contrapartida + plano de carreira).</div>
<h4>Blocos de financiamento (atualização)</h4>
<p>Antes, o financiamento federal era dividido em <b>6 blocos</b>. A <b>Portaria 3.992/2017</b> reorganizou em apenas <b>2 blocos</b>: <b>Custeio</b> e <b>Investimento</b>. Na APS, o financiamento mudou com o programa <b>Previne Brasil (2019)</b>: capitação ponderada + pagamento por desempenho + incentivos específicos, substituindo o antigo PAB fixo/variável.</p>`,

      subtopics:[{id:"o1",t:"Níveis de atenção e porta de entrada"},{id:"o2",t:"Regionalização e hierarquização"},{id:"o3",t:"Redes de Atenção à Saúde (RAS)"},{id:"o4",t:"Pactos e governança"}],
      teach:`<h3>Entendendo do zero</h3>
<p>Um sistema de saúde precisa de <strong>organização espacial</strong>: nem todo serviço pode existir em todo lugar (não há tomógrafo em cada esquina), mas todo cidadão precisa de uma <b>porta de entrada</b> perto de casa. A solução do SUS é organizar tudo como uma <strong>pirâmide conectada</strong> e, mais modernamente, como <strong>redes</strong>.</p>
${SVG_PIRAMIDE}
<div class="box tip"><b>Analogia:</b> pense na APS como a <b>recepção de um grande hotel</b> — ela resolve a maioria das demandas e, quando necessário, encaminha você ao serviço certo (andar/quarto = média/alta complexidade) e coordena seu retorno. Por isso a APS é <b>porta de entrada</b> e <b>ordenadora do cuidado</b>.</p></div>
<h3>Níveis de atenção</h3>
<ul>
<li><b>Atenção Primária (APS):</b> UBS/ESF. Resolve ~85% dos problemas. Porta de entrada preferencial e coordenadora.</li>
<li><b>Atenção Secundária:</b> média complexidade — especialidades, exames, pequenas cirurgias (ambulatórios/UPAs/hospitais gerais).</li>
<li><b>Atenção Terciária:</b> alta complexidade/alto custo — hospitais especializados, UTI, transplantes.</li></ul>
<h3>Regionalização e hierarquização</h3>
<p><b>Regionalização:</b> organizar serviços em <b>regiões de saúde</b> (recorte territorial com municípios que compartilham serviços) para garantir acesso integral perto do cidadão. <b>Hierarquização:</b> ordenar os serviços por <b>nível de complexidade crescente</b>, com mecanismos de <b>referência</b> (encaminhar para cima) e <b>contrarreferência</b> (devolver para a APS com o desfecho).</p>
<div class="box warn"><b>Pegadinha:</b> hierarquização <b>não significa</b> que um nível é "superior" ao outro em importância. Significa <b>organização por densidade tecnológica</b>. A APS é a base e a mais resolutiva em volume.</div>
<h3>Redes de Atenção à Saúde (RAS) — Portaria 4.279/2010 e Decreto 7.508/2011</h3>
<p>O modelo piramidal evoluiu para o de <strong>redes poliárquicas</strong> (sem hierarquia rígida de "andares"), centradas na APS como <b>centro de comunicação</b>. As RAS articulam pontos de atenção, sistemas de apoio (diagnóstico, assistência farmacêutica), logística (regulação, prontuário, transporte) e governança.</p>
<p>Redes temáticas prioritárias: <b>Rede Cegonha</b> (materno-infantil), <b>RUE</b> (urgência e emergência), <b>RAPS</b> (saúde mental/atenção psicossocial), <b>Rede de Cuidado à Pessoa com Deficiência</b>, <b>Rede de Atenção às Doenças Crônicas</b>.</p>
<h4>Decreto 7.508/2011 — conceitos cobrados</h4>
<ul>
<li><b>Região de Saúde:</b> espaço geográfico contínuo de municípios limítrofes.</li>
<li><b>Mapa da Saúde:</b> descrição geográfica da distribuição de recursos e serviços.</li>
<li><b>RENASES:</b> Relação Nacional de Ações e Serviços de Saúde.</li>
<li><b>RENAME:</b> Relação Nacional de Medicamentos Essenciais.</li>
<li><b>COAP:</b> Contrato Organizativo da Ação Pública — formaliza responsabilidades entre entes.</li>
<li><b>Portas de entrada:</b> APS, urgência/emergência, atenção psicossocial e especiais de acesso aberto.</li></ul>
<h3>Pactuação e governança</h3>
<p>As decisões são pactuadas em comissões intergestores: <b>CIT</b> (Tripartite — União/estados/municípios), <b>CIB</b> (Bipartite — estado/municípios) e <b>CIR</b> (Regional). O <b>Pacto pela Saúde (2006)</b> trouxe os componentes Pela Vida, Em Defesa do SUS e de Gestão, depois evoluindo para os instrumentos do Decreto 7.508.</p>`,

      teach:`<h3>Entendendo do zero</h3>
<p>Imagine a saúde de uma pessoa como uma <b>casa</b>. A Atenção Primária à Saúde (APS) é a <b>porta da frente e o corredor central</b> dessa casa: é por onde você entra na maioria das vezes, é quem te conhece ao longo dos anos e é quem te orienta para qual "cômodo" (especialista, hospital) ir quando preciso — e te recebe de volta. Não é "a medicina mais simples"; é a medicina <b>mais ampla e contínua</b>.</p>
<p>A grande referência mundial sobre o que faz uma APS ser "de verdade" é a pesquisadora <b>Barbara Starfield</b>. Ela definiu os <b>atributos</b> que um sistema precisa ter para ser considerado de Atenção Primária forte. Países com APS forte têm <b>melhores indicadores de saúde com menor custo</b> — esse é o argumento-chave que a prova adora.</p>
<div class="box tip"><b>Mnemônico dos 4 essenciais:</b> pense em <b>"PILE"</b> — <b>P</b>rimeiro contato, <b>I</b>ntegralidade, <b>L</b>ongitudinalidade, <b>C</b>oordenação. (PILE com C de "coordena".)</div>
<h3>Os 4 atributos ESSENCIAIS</h3>
<p><b>1) Primeiro contato (acesso):</b> a APS é a <b>porta de entrada preferencial</b> do sistema a cada novo problema. Tem dois componentes: <b>acessibilidade</b> (a UBS está disponível, sem barreiras) e <b>utilização</b> (a população realmente a procura primeiro). Atua como <b>filtro/gatekeeper</b>, evitando uso desnecessário de níveis mais caros.</p>
<p><b>2) Longitudinalidade:</b> o <b>vínculo ao longo do tempo</b> entre a equipe e a pessoa/família, <b>independentemente</b> do tipo de problema. É acompanhar a mesma pessoa por anos, conhecendo sua história. Não confundir com "continuidade do cuidado" (que é a coordenação de um episódio específico).</p>
<div class="box warn"><b>Pegadinha clássica:</b> <b>Longitudinalidade ≠ continuidade.</b> Longitudinalidade = relação que dura anos, qualquer problema. Continuidade = informação que flui dentro de um mesmo episódio/encaminhamento. A banca troca os dois.</div>
<p><b>3) Integralidade:</b> a equipe reconhece e responde ao <b>espectro completo de necessidades</b> (promoção, prevenção, cura, reabilitação, cuidados paliativos), oferecendo diretamente ou garantindo o serviço em outro ponto. Vê a pessoa como um todo, não só a doença do dia.</p>
<p><b>4) Coordenação do cuidado:</b> a APS é a <b>maestrina</b> — integra os cuidados recebidos em outros pontos da rede, evitando fragmentação, duplicação de exames e contradição de condutas. Depende de bons sistemas de informação (prontuário) e da contrarreferência.</p>
${SVG_PIRAMIDE}
<h3>Os 3 atributos DERIVADOS</h3>
<p>Derivam dos essenciais e só existem plenamente quando os 4 essenciais estão presentes:</p>
<ul>
<li><b>Orientação familiar:</b> considerar o <b>contexto familiar</b> no cuidado (genograma, dinâmica, ciclo de vida familiar).</li>
<li><b>Orientação comunitária:</b> reconhecer as <b>necessidades de saúde da comunidade</b> e do território (diagnóstico de saúde local, ações coletivas, participação social).</li>
<li><b>Competência cultural:</b> adaptar-se às <b>características culturais</b> da população para facilitar a relação e a adesão.</li>
</ul>
<div class="box"><b>Por que cai tanto?</b> A prova adora pedir para você <b>classificar</b> um atributo (essencial vs derivado) ou <b>identificar</b> qual atributo está descrito numa vinheta clínica. Domine o reconhecimento de cada um por uma frase-chave.</div>
<h3>PNAB e medição (PCATool)</h3>
<p>No Brasil, a APS é regida pela <b>PNAB — Política Nacional de Atenção Básica</b> (versão vigente de <b>2017, Portaria 2.436</b>). Ela define a <b>Atenção Básica</b> como conjunto de ações no âmbito individual e coletivo (promoção, proteção, prevenção, diagnóstico, tratamento, reabilitação, redução de danos, cuidados paliativos), com a <b>ESF como estratégia prioritária</b> de expansão e consolidação.</p>
<p>A presença/extensão dos atributos é medida por instrumentos validados, sendo o mais conhecido o <b>PCATool</b> (Primary Care Assessment Tool), adaptado para o Brasil. Aparece em questões teóricas como "instrumento de avaliação dos atributos da APS".</p>
<div class="box tip"><b>Atualização:</b> No Brasil costuma-se usar <b>Atenção Básica (AB)</b> e <b>Atenção Primária à Saúde (APS)</b> como sinônimos na prática e na PNAB 2017. Algumas bancas distinguem AB (termo oficial brasileiro) de APS (termo internacional); se houver distinção, siga o enunciado.</div>`,

      teach:`<h3>Entendendo do zero</h3>
<p>Se a APS é a "porta da frente" do sistema, a <b>Estratégia Saúde da Família (ESF)</b> é o <b>jeito brasileiro de organizar essa porta</b>. Em vez de uma UBS genérica atendendo quem aparece, a ESF cria <b>equipes responsáveis por um território e por um número definido de famílias</b>. Cada família tem "sua" equipe, que a conhece, visita e acompanha.</p>
<p>Pense numa escola: em vez de qualquer professor atender qualquer aluno, cada turma tem um professor responsável que conhece cada estudante pelo nome, sabe quem está faltando e vai atrás. A ESF faz isso com a saúde de um território.</p>
<div class="box tip"><b>Conceito-âncora:</b> a ESF é a <b>estratégia prioritária</b> de organização da Atenção Básica no Brasil (PNAB 2017). Ela operacionaliza os atributos da APS — especialmente longitudinalidade e orientação comunitária.</div>
<h3>Composição da equipe de Saúde da Família (eSF)</h3>
<p>A equipe mínima da ESF inclui:</p>
<ul>
<li><b>Médico</b> (preferencialmente especialista em Medicina de Família e Comunidade);</li>
<li><b>Enfermeiro</b>;</li>
<li><b>Técnico ou auxiliar de enfermagem</b>;</li>
<li><b>Agentes Comunitários de Saúde (ACS)</b> — elo entre comunidade e equipe;</li>
<li>Pode incluir <b>equipe de Saúde Bucal</b> (cirurgião-dentista + auxiliar/técnico).</li>
</ul>
<p>Parâmetros populacionais (PNAB 2017, valores de referência): cada eSF responsabiliza-se por uma população adscrita, recomendada em torno de <b>2.000 a 3.500 pessoas</b> por equipe; cada <b>ACS</b> cobre um número de famílias/pessoas do seu microárea (até ~750 pessoas em áreas de maior vulnerabilidade). O número exato pode ser cobrado, mas o conceito de <b>população adscrita</b> é o mais importante.</p>
<div class="box warn"><b>Pegadinha:</b> a recomendação de população por equipe é uma <b>faixa de referência</b>, ajustável por vulnerabilidade do território — não um número rígido único. Bancas exploram o "número mágico"; priorize o intervalo (~2.000–3.500) e o princípio de ajuste por risco.</div>
<h3>Território, territorialização e adscrição</h3>
<p><b>Territorialização:</b> processo de <b>reconhecer e delimitar</b> a área de atuação da equipe — mapear população, riscos, equipamentos sociais, barreiras de acesso. É a base do diagnóstico de saúde local.</p>
<p><b>Adscrição da clientela:</b> <b>vincular</b> a população do território a uma equipe específica. É o que permite a longitudinalidade (a equipe sabe de quem é responsável). O território divide-se em <b>microáreas</b> (cada uma sob um ACS).</p>
<p><b>Visita domiciliar (VD)</b> e <b>busca ativa</b>: ferramentas-chave para alcançar quem não chega à UBS (acamados, faltosos, grupos de risco). A VD é central no trabalho do ACS e da equipe.</p>

<h3>Apoio matricial: do NASF ao eMulti</h3>
<p>Para dar suporte às equipes em casos que exigem outras especialidades (fisioterapia, psicologia, nutrição, etc.), criou-se o <b>apoio matricial</b>. O antigo <b>NASF-AB</b> (Núcleo Ampliado de Saúde da Família e Atenção Básica) foi <b>substituído pelas equipes Multiprofissionais — eMulti</b> (Portaria GM/MS 635/2023). As eMulti atuam em <b>apoio matricial</b>: <b>compartilham o cuidado</b> com as eSF (discussão de casos, atendimento conjunto, projeto terapêutico singular), em vez de funcionarem como ambulatório de especialidades isolado.</p>
<div class="box tip"><b>Atualização importante (cai em prova recente):</b> <b>NASF-AB → eMulti</b> (2023). O conceito central permanece: <b>apoio matricial</b> (matriciamento) = suporte técnico-pedagógico e clínico às equipes, não substituição do encaminhamento por consulta avulsa.</div>
<h3>Ferramentas da prática</h3>
<ul>
<li><b>Projeto Terapêutico Singular (PTS):</b> plano de cuidado individualizado construído pela equipe para casos complexos.</li>
<li><b>Genograma e ecomapa:</b> instrumentos de abordagem familiar.</li>
<li><b>Linhas de cuidado:</b> organização do percurso do usuário por condição (ex.: gestante, hipertenso).</li>
<li><b>Acolhimento com classificação de risco:</b> escuta qualificada na porta de entrada.</li>
</ul>`,

      teach:`<h3>Entendendo do zero</h3>
<p>Pense na pressão arterial como a <b>força da água dentro de uma mangueira</b>. Se a pressão fica cronicamente alta, a "mangueira" (suas artérias) sofre desgaste e os órgãos que recebem esse fluxo — <b>coração, cérebro, rins, olhos</b> — vão sendo lesados silenciosamente, muitas vezes <b>sem sintoma nenhum</b> por anos. Por isso a HAS é a "matadora silenciosa" e por isso o rastreio e o controle são tão importantes na APS.</p>
<p>Hipertensão é <b>o fator de risco modificável mais prevalente</b> para doença cardiovascular no Brasil. Dominar HAS é dominar a maior fatia das questões de "condutas" em ENARE/Revalida.</p>
<div class="box tip"><b>Analogia da meta:</b> tratar HAS não é "normalizar um número no papel"; é <b>reduzir o risco de AVC, infarto e doença renal</b>. O número é só o termômetro.</div>
<h3>Diagnóstico — os números que você precisa decorar</h3>
<p>Pela <b>Diretriz Brasileira de Hipertensão Arterial 2025 (SBC/SBH/SBN)</b>, considera-se HAS quando a <b>PA ≥ 140/90 mmHg</b> em consultório, confirmada em duas ocasiões. <b>Mudança 2025:</b> as categorias "ótima" e "normal/limítrofe" foram extintas; "12 por 8" deixou de ser normal. Nova classificação:</p>
<ul>
<li><b>PA normal:</b> &lt;120/80 (único alvo de normalidade)</li>
<li><b>Pré-hipertensão (NOVA faixa ampliada):</b> PAS 120–139 <b>e/ou</b> PAD 80–89</li>
<li><b>HAS estágio 1:</b> 140–159/90–99 · <b>Estágio 2:</b> 160–179/100–109 · <b>Estágio 3:</b> ≥180/110</li>
</ul>
<div class="box tip"><b>Novidades 2025:</b> capítulos inéditos de <b>HAS em mulheres</b> e <b>HAS na APS/SUS</b>; rastreio ampliado de <b>hiperaldosteronismo primário</b>; uso de equipamentos automáticos de braço.</div>
<div class="box warn"><b>Pegadinha:</b> o diagnóstico exige <b>confirmação</b> (≥2 medidas em ≥2 consultas), <b>exceto</b> quando PA ≥180/110 <b>com</b> lesão de órgão-alvo/risco alto, ou em emergência hipertensiva — aí o diagnóstico é imediato. Uma única medida alta não fecha HAS.</p></div>
<h3>Medida correta e MAPA/MRPA</h3>
<p>Técnica importa: paciente sentado, repouso de 3–5 min, manguito adequado, braço apoiado. O <b>jaleco branco</b> (PA alta só no consultório) e o <b>mascaramento</b> (normal no consultório, alta fora) justificam a medida fora do consultório:</p>
<ul>
<li><b>MAPA</b> (Monitorização Ambulatorial 24h): hipertensão se média de <b>24h ≥130/80</b>, <b>vigília ≥135/85</b>, <b>sono ≥120/70</b>.</li>
<li><b>MRPA</b> (Monitorização Residencial): hipertensão se média <b>≥135/85</b>.</li>
</ul>
${SVG_PIRAMIDE}
<h3>Estratificação de risco e metas</h3>
<p>A estratificação por <b>risco cardiovascular global</b> orienta a intensidade. <b>Mudança-chave 2025:</b> meta pressórica <b>universal &lt;130/80 mmHg</b> para todos os hipertensos, independentemente de idade, risco ou fragilidade (relativizada a antiga "curva J"). Pré-hipertensos de baixo risco: só MEV. Estágio 1 de baixo risco: <b>tratamento medicamentoso imediato</b> (preferir dupla), abandonando a espera de 3 meses de MEV isolada.</p>
<h3>Tratamento</h3>
<p><b>Não farmacológico (sempre):</b> dieta DASH, restrição de sódio, perda de peso, atividade física, moderação de álcool, cessação do tabagismo.</p>
<p><b>Farmacológico — 5 classes de 1ª linha:</b> <b>diuréticos tiazídicos</b> (clortalidona/hidroclorotiazida/indapamida), <b>IECA</b> (enalapril), <b>BRA</b> (losartana), <b>bloqueadores de canais de cálcio (BCC)</b> di-hidropiridínicos (anlodipino). <b>Betabloqueadores não são 1ª linha</b> isolada, salvo indicação específica (pós-IAM, IC, arritmia).</p>
<div class="box tip"><b>Tratamento (2025):</b> iniciar preferencialmente com <b>combinação dupla em dose baixa</b> (IECA/BRA + BCC ou + tiazídico), inclusive no estágio 1 de baixo risco. Monoterapia reservada a casos selecionados (idoso muito frágil). "Urgência hipertensiva" foi <b>substituída</b> por "<b>elevação importante da PA sem lesão de órgão-alvo</b>"; emergência hipertensiva = LOA aguda + internação.</div>
<div class="box warn"><b>Não associe IECA + BRA</b> (risco renal/hipercalemia). Em negros e idosos, BCC e tiazídicos costumam ser mais eficazes que IECA/BRA isolados.</p></div>`,

      erros:`<ul>
<li><b>Fechar HAS com uma única medida.</b> Exige confirmação (salvo PA muito alta com LOA/emergência).</li>
<li><b>Usar betabloqueador como 1ª linha isolada.</b> Só com indicação específica.</li>
<li><b>Associar IECA + BRA.</b> Risco de hipercalemia e lesão renal.</li>
<li><b>Esquecer os limiares de MAPA/MRPA</b> (consultório ≥140/90; MRPA/MAPA-vigília ≥135/85).</li>
<li><b>Tratar só o número</b> e ignorar a estratificação de risco global.</li></ul>`,
      summary:`<p><b>Véspera — HAS (2025):</b> Normal &lt;120/80; <b>pré-HAS 120-139/80-89</b> (ótima/normal-limítrofe extintas). Dx ≥140/90 (confirmar). MAPA 24h≥130/80; vigília/MRPA≥135/85; sono≥120/70. Estágios 1/2/3. <b>Meta universal &lt;130/80</b>. Estágio 1 baixo risco já trata (dupla). 1ª linha: tiazídico/IECA/BRA/BCC (BB não isolado). Nunca IECA+BRA. "Urgência"→"elevação importante sem LOA".</p>`,

      teach:`<h3>Entendendo do zero</h3>
<p>Imagine a <b>insulina como uma chave</b> que abre as portas das células para a glicose entrar e virar energia. No DM2, o corpo produz insulina, mas as "fechaduras" estão <b>resistentes</b> (resistência insulínica) e, com o tempo, o pâncreas "cansa". A glicose sobra no sangue e, em excesso crônico, lesa vasos e nervos — daí as complicações (retina, rim, nervos, coração).</p>
<div class="box tip"><b>Mensagem central:</b> tratar DM2 é controlar a glicemia <b>e</b> proteger coração e rim. Por isso classes novas (SGLT2, GLP-1) entraram com força — vão além do açúcar.</p></div>
<h3>Diagnóstico (SBD)</h3>
<p>Confirma-se DM com qualquer um (repetir para confirmar, salvo sintomas + glicemia inequívoca):</p>
<ul>
<li><b>Glicemia de jejum ≥126 mg/dL</b></li>
<li><b>Glicemia 2h no TOTG (75g) ≥200 mg/dL</b></li>
<li><b>HbA1c ≥6,5%</b></li>
<li><b>Glicemia aleatória ≥200</b> + sintomas clássicos (poliúria, polidipsia, perda de peso)</li>
</ul>
<p><b>Pré-diabetes:</b> jejum 100–125; TOTG 2h 140–199; HbA1c 5,7–6,4%.</p>
<div class="box warn"><b>Pegadinha:</b> um único exame alterado <b>sem sintomas</b> precisa de <b>confirmação</b> (repetir o mesmo teste ou outro). Sintomas clássicos + glicemia ≥200 dispensam repetição.</p></div>
<h3>Metas de HbA1c (individualizadas)</h3>
<ul>
<li><b>Adulto geral:</b> &lt;7%.</li>
<li><b>Idoso saudável:</b> &lt;7–7,5%; <b>idoso frágil/comorbidades:</b> &lt;8–8,5% (evitar hipoglicemia).</li>
<li><b>Gestação/jovem sem complicações:</b> mais rígida, individualizar.</li>
</ul>
${SVG_PRINCIPIOS}
<h3>Tratamento — começa pela metformina</h3>
<p><b>Metformina</b> é a <b>1ª linha</b> (salvo contraindicação: TFG &lt;30, instabilidade). Reduz produção hepática de glicose, não causa hipoglicemia isolada, é barata.</p>
<p><b>Classes seguintes (escolha guiada pelo perfil):</b></p>
<ul>
<li><b>iSGLT2</b> (dapagliflozina, empagliflozina): benefício <b>cardiovascular e renal</b>, perda de peso; preferir se DCV, IC ou doença renal. Risco: ITU/genital, cetoacidose euglicêmica.</li>
<li><b>Análogos de GLP-1</b> (liraglutida, semaglutida): benefício CV e <b>perda de peso</b> robusta; náusea inicial.</li>
<li><b>Sulfonilureias</b> (glibenclamida, gliclazida): baratas, mas <b>causam hipoglicemia e ganho de peso</b>.</li>
<li><b>iDPP-4</b> (sitagliptina): neutras em peso, bem toleradas.</li>
</ul>
<div class="box tip"><b>Atualização (SBD/ADA):</b> em paciente com <b>doença CV, IC ou doença renal</b>, priorizar <b>iSGLT2 e/ou GLP-1</b> independentemente da HbA1c, pelo benefício de órgão.</p></div>
<h3>Insulinização</h3>
<p>Indicada quando metas não são atingidas com orais, na presença de sintomas com hiperglicemia importante (ex.: HbA1c ≳9–10%) ou em situações agudas. Começa-se geralmente com <b>insulina basal (NPH ou análogo) noturna</b>, titulando pela glicemia de jejum; depois pode-se intensificar com bolus às refeições.</p>
<div class="box warn"><b>Rastreio de complicações (não esqueça na prova):</b> fundo de olho anual, microalbuminúria/creatinina (rim), exame dos pés (neuropatia), lipídios e PA.</p></div>`,

<tr><td>Jejum (mg/dL)</td><td>&lt;100</td><td>100–125</td><td>≥126</td></tr>

      erros:`<ul>
<li><b>Repetir exame alterado é regra</b> — só dispensa com sintomas clássicos + glicemia ≥200.</li>
<li><b>Mesma meta de HbA1c para todos.</b> Individualizar (idoso frágil tolera mais alta).</li>
<li><b>Esquecer benefício de órgão de iSGLT2/GLP-1</b> em DCV/IC/renal.</li>
<li><b>Sulfonilureia em idoso</b> → cuidado com hipoglicemia.</li>
<li><b>Não rastrear complicações</b> (olho, rim, pé).</li></ul>`,
      summary:`<p><b>Véspera — DM2:</b> Dx: jejum ≥126, TOTG2h ≥200, HbA1c ≥6,5%, ou aleatória ≥200+sintomas (confirmar salvo sintomas claros). Pré-DM: 100-125 / 140-199 / 5,7-6,4%. Meta geral &lt;7% (frágil &lt;8-8,5%). 1ª linha metformina; iSGLT2/GLP-1 se DCV/IC/renal. Insulina basal noturna quando orais falham. Rastrear olho/rim/pé.</p>`,

      teach:`<h3>Entendendo do zero</h3>
<p>O <b>colesterol LDL</b> é como o "caminhão de carga" que deposita gordura nas paredes das artérias, formando placas (aterosclerose). Quanto maior o risco cardiovascular da pessoa, <b>mais baixo</b> queremos esse LDL — porque cada miligrama a menos significa menos placa e menos risco de infarto/AVC. Já a <b>obesidade</b> é o terreno que alimenta HAS, DM2 e dislipidemia ao mesmo tempo.</p>
<div class="box tip"><b>Princípio:</b> não tratamos "um número de colesterol"; tratamos o <b>risco cardiovascular global</b>. A meta de LDL depende do risco da pessoa.</p></div>
<h3>Estratificação e metas de LDL</h3>
<p>Pela <b>Diretriz Brasileira de Dislipidemias e Prevenção da Aterosclerose 2025</b>, metas de LDL-c por risco. <b>Grande novidade:</b> criação da categoria <b>risco extremo (LDL &lt;40)</b>:</p>
<ul>
<li><b>Risco baixo:</b> LDL &lt;130 mg/dL</li>
<li><b>Risco intermediário:</b> &lt;100</li>
<li><b>Risco alto:</b> &lt;70</li>
<li><b>Risco muito alto</b> (DCV/evento, escore cálcio &gt;300, DM com estratificadores): &lt;50</li>
<li><b>Risco extremo (NOVO):</b> &lt;40</li>
</ul>
<div class="box tip"><b>Mudanças 2025:</b> perfil lipídico <b>sem jejum</b> (exceto se TG &gt;440 → repetir em jejum); ênfase em <b>colesterol não-HDL, ApoB e Lp(a)</b> como marcadores; considerar tratamento se <b>LDL persistir ≥145</b> mesmo em baixo risco.</div>
<div class="box warn"><b>Pegadinha:</b> evento prévio (IAM, AVC, DAOP) = muito alto risco (LDL &lt;50); se DCV recorrente/múltiplos fatores, pode ser <b>risco extremo (LDL &lt;40)</b>, com estatina de alta potência.</p></div>
<h3>Estatinas e adjuvantes</h3>
<p><b>Estatinas</b> são a base (reduzem síntese hepática de colesterol). Alta potência: <b>atorvastatina 40–80 mg, rosuvastatina 20–40 mg</b>. Se não atingir meta: associar <b>ezetimiba</b>; em casos selecionados de muito alto risco, <b>inibidores de PCSK9</b>.</p>
<p>Monitorar: pode haver mialgia e elevação de transaminases/CK (raramente significativa). Não suspender por queixa leve sem avaliação.</p>
<h3>Obesidade — avaliação</h3>
<p>Classificação pelo <b>IMC (kg/m²)</b>: sobrepeso 25–29,9; <b>obesidade grau I</b> 30–34,9; <b>grau II</b> 35–39,9; <b>grau III</b> ≥40. A <b>circunferência abdominal</b> (risco aumentado: ≥94 cm homens, ≥80 cm mulheres — pontos europeus; há variações) reflete gordura visceral e risco metabólico.</p>
<h3>Tratamento da obesidade</h3>
<ul>
<li><b>Base:</b> mudança de estilo de vida (dieta, atividade física, comportamento) — sempre.</li>
<li><b>Farmacoterapia</b> (IMC ≥30, ou ≥27 com comorbidade): análogos de <b>GLP-1</b> (liraglutida, semaglutida), sibutramina, orlistate — conforme perfil e disponibilidade.</li>
<li><b>Cirurgia bariátrica:</b> indicada classicamente com <b>IMC ≥40</b>, ou <b>≥35 com comorbidades</b> (DM2, HAS grave, apneia). Tendência atual amplia para IMC ≥30–34,9 com DM2 de difícil controle em casos selecionados.</li>
</ul>
<div class="box tip"><b>Conexão de prova:</b> GLP-1 aparece tanto no DM2 quanto na obesidade — peça-chave que conecta os dois temas do módulo.</p></div>`,

      teach:`<h3>Entendendo do zero</h3>
<p>Prevenir é agir <b>antes que o problema fique grande</b>. Pense numa represa: <b>prevenção primária</b> evita que a água suba (impede a doença surgir); <b>secundária</b> detecta a rachadura cedo (rastreio); <b>terciária</b> conserta o estrago e reabilita; e <b>quaternária</b> evita "consertos demais" — protege o paciente do <b>excesso de medicina</b> (exames e tratamentos desnecessários).</p>
<div class="box tip"><b>Mnemônico:</b> 1ª evita, 2ª detecta cedo, 3ª reabilita, 4ª protege do excesso.</div>
<h3>Os 4 níveis de prevenção</h3>
<ul>
<li><b>Primária:</b> impede a doença (vacinação, cessação do tabagismo, dieta). Atua antes da doença existir.</li>
<li><b>Secundária:</b> detecta precocemente em assintomáticos — é o <b>rastreamento</b> (Papanicolaou/DNA-HPV, mamografia).</li>
<li><b>Terciária:</b> reduz sequelas e reabilita em quem já tem a doença (reabilitação pós-AVC).</li>
<li><b>Quaternária:</b> evita intervenções desnecessárias e a <b>medicalização</b> (prevenção quaternária = "primum non nocere").</li>
</ul>
<div class="box warn"><b>Pegadinha:</b> rastreamento ≠ diagnóstico precoce. <b>Rastreamento</b> = testar <b>assintomáticos</b> da população. <b>Diagnóstico precoce</b> = identificar cedo em quem <b>já tem sinais/sintomas</b>.</div>
<h3>Critérios de um bom programa de rastreio (Wilson & Jungner)</h3>
<p>A doença deve ser <b>frequente e grave</b>, ter <b>fase pré-clínica detectável</b>, existir <b>teste sensível, aceitável e barato</b>, e <b>tratamento eficaz</b> na fase precoce que mude o desfecho. Sem isso, rastrear pode causar mais dano que benefício.</p>
<h3>Vieses do rastreamento</h3>
<ul>
<li><b>Lead time bias</b> (antecipação diagnóstica): parece que o paciente "vive mais" só porque o diagnóstico foi antecipado, sem mudar a morte real.</li>
<li><b>Length bias</b> (duração): o rastreio capta preferencialmente tumores indolentes (crescimento lento), superestimando o benefício.</li>
<li><b>Sobrediagnóstico:</b> detectar lesões que nunca causariam dano — leva a sobretratamento.</li>
</ul>`,

      teach:`<h3>Entendendo do zero</h3>
<p>Cada câncer rastreável tem <b>idade de início, exame e intervalo</b> próprios — é isso que a prova cobra. A lógica: rastrear quando há ganho real, na população certa, no intervalo que equilibra benefício e dano. Aqui estão os <b>protocolos brasileiros atualizados</b>.</p>
<h3>Câncer de colo do útero — MUDANÇA 2024/2025</h3>
<p><b>Grande atualização:</b> o SUS incorporou em 2024 o <b>teste de DNA-HPV oncogênico</b> como método de <b>rastreio primário</b>, substituindo gradualmente a citologia (Papanicolaou). É mais sensível e permite intervalos maiores.</p>
<ul>
<li><b>População-alvo:</b> mulheres de <b>25 a 64 anos</b> (mantida no Brasil).</li>
<li><b>Intervalo (DNA-HPV):</b> se negativo, repetir a cada <b>5 anos</b>.</li>
<li>Acima de 64 anos: pode-se <b>encerrar</b> o rastreio com ao menos um DNA-HPV negativo recente (e histórico adequado).</li>
<li>Resultado <b>HPV positivo</b> → triagem com <b>citologia reflexa</b> e/ou genotipagem (16/18) e colposcopia conforme protocolo.</li>
</ul>
<div class="box tip"><b>Transição:</b> onde o DNA-HPV ainda não chegou, mantém-se a <b>citologia</b>: 2 exames anuais; se ambos normais, a cada <b>3 anos</b>, dos 25 aos 64 anos. Implantação do DNA-HPV é gradual (piloto 2025→expansão 2026).</div>
<div class="box warn"><b>Pegadinha:</b> as duas técnicas <b>não coexistem</b> na mesma unidade. Início do rastreio só após <b>25 anos</b> e <b>início da atividade sexual</b> — não rastrear adolescentes.</div>
<h3>Câncer de mama — atualização recente (SUS)</h3>
<ul>
<li><b>50 a 74 anos:</b> mamografia <b>bienal</b> (rastreamento populacional; faixa ampliada para incluir 70–74).</li>
<li><b>40 a 49 anos:</b> mamografia <b>sob demanda / decisão compartilhada</b> (acesso garantido mesmo sem sintomas), individualizando.</li>
<li>Acima de 74 anos: individualizar conforme expectativa de vida.</li>
<li>Alto risco (mutação BRCA, história familiar forte): protocolo específico, início mais precoce e RM.</li>
</ul>
<div class="box warn"><b>Atenção:</b> a recomendação histórica do INCA era 50–69 bienal; houve <b>ampliação recente</b> para 50–74 e acesso garantido aos 40–49 por decisão compartilhada. Cite a faixa conforme o enunciado.</div>
<h3>Câncer colorretal</h3>
<ul>
<li><b>Idade:</b> rastrear de <b>45 a 75 anos</b> (tendência atual, alinhada à American Cancer Society; antes iniciava aos 50). Acima de 75: individualizar; geralmente não rastrear após 85.</li>
<li><b>Métodos:</b> <b>sangue oculto nas fezes</b> (imunoquímico/FIT) anual, ou <b>colonoscopia</b> a cada 10 anos, ou retossigmoidoscopia.</li>
<li>Alto risco (HF, doença inflamatória intestinal, síndromes) → iniciar mais cedo e intervalo menor.</li>
</ul>
<h3>Outros rastreios relevantes</h3>
<ul>
<li><b>Próstata:</b> NÃO há recomendação de rastreamento populacional universal pelo MS/INCA; PSA por <b>decisão compartilhada</b> (55–69 conforme algumas sociedades).</li>
<li><b>Colo/aorta/pulmão:</b> rastreio de <b>câncer de pulmão</b> com TC de baixa dose em tabagistas pesados (50–80a) é discutido; não universal no SUS.</li>
<li><b>HIV, sífilis, hepatites B/C:</b> rastrear conforme risco e no pré-natal.</li>
</ul>`,

/* ---------- GAMIFICAÇÃO ---------- */
function allSubIds(){let n=0;MODULES.forEach(m=>m.topics.forEach(t=>{n+=t.CONTENT.subtopics.length;}));return n;}
function allTopicIds(){let n=0;MODULES.forEach(m=>n+=m.topics.length);return n;}
function allQ(){let n=0;MODULES.forEach(m=>m.topics.forEach(t=>n+=t.CONTENT.questions.length));return n;}
function masteredCards(){let n=0;Object.values(S.srs).forEach(c=>{if(c.interval>=21)n++;});return n;}
function deckSize(){let n=S.cards.length;MODULES.forEach(m=>m.topics.forEach(t=>n+=t.CONTENT.flashcards.length));return n;}

function computeGlobalPct(){
  const subTot=allSubIds()||1, qTot=allQ()||1, deck=deckSize()||1;
  const subDone=Object.keys(S.done).filter(k=>k.startsWith("sub:")).length;
  const qRight=Object.keys(S.qRight).length;
  const fcMast=masteredCards();
  const revs=Math.min(S.revisions,200);
  const casesTot=()=>{let n=0;MODULES.forEach(m=>m.topics.forEach(t=>n+=t.CONTENT.cases.length));return n||1;};
  const casesDone=Object.keys(S.casesDone).length;
  // ponderado: subtópicos 40%, questões 25%, flashcards dominados 15%, revisões 10%, casos 10%
  const pct = 0.40*(subDone/subTot) + 0.25*(qRight/qTot) + 0.15*(fcMast/deck)
            + 0.10*(revs/200) + 0.10*(casesDone/casesTot());
  return Math.min(100, Math.round(pct*100));
}

/* ---------- RADAR DE COMPETÊNCIAS ---------- */
function radarSVG(){
  const labels=["SUS","Epidemio","Bioest.","MBE","APS","Vacinas","Rastreio","Gestão"];
  const vals=labels.map((l,i)=>{const m=MODULES[i];if(!m)return .1;
    const tot=m.topics.length||1;const done=m.topics.filter(t=>S.done["topic:"+t.id]).length;return Math.max(.08,done/tot);});
  const cx=150,cy=150,r=110,n=8;
  let grid="";for(let g=1;g<=4;g++){let pts="";for(let i=0;i<n;i++){const a=Math.PI*2*i/n-Math.PI/2;pts+=`${cx+Math.cos(a)*r*g/4},${cy+Math.sin(a)*r*g/4} `;}grid+=`<polygon points="${pts}" fill="none" stroke="var(--border)"/>`;}
  let poly="",dots="";for(let i=0;i<n;i++){const a=Math.PI*2*i/n-Math.PI/2;const x=cx+Math.cos(a)*r*vals[i],y=cy+Math.sin(a)*r*vals[i];poly+=`${x},${y} `;dots+=`<circle cx="${x}" cy="${y}" r="3" fill="#D962D9"/>`;}
  let lbl="";for(let i=0;i<n;i++){const a=Math.PI*2*i/n-Math.PI/2;lbl+=`<text x="${cx+Math.cos(a)*(r+22)}" y="${cy+Math.sin(a)*(r+22)}" font-size="10" fill="var(--muted)" text-anchor="middle" font-family="Inter">${labels[i]}</text>`;}
  return `<svg viewBox="0 0 300 300" style="max-width:320px">${grid}<polygon points="${poly}" fill="rgba(20,184,166,.25)" stroke="#14B8A6" stroke-width="2"/>${dots}${lbl}</svg>`;
}

function splitH3(html){
  const re=/<h3>(.*?)<\/h3>/g; let m,idx=[],titles=[];

/* FLUXOGRAMA interativo */
function renderFlow(flow,boxId){
  const box=document.getElementById(boxId);if(!box||!flow)return;
  // ordena começando pelo start, seguindo as ramificações (BFS) para um fluxo visual coerente
  const order=[],seen=new Set();const queue=[flow.start];
  while(queue.length){const id=queue.shift();if(seen.has(id)||!flow.nodes[id])continue;seen.add(id);order.push(id);(flow.nodes[id].opts||[]).forEach(o=>queue.push(o.to));}
  Object.keys(flow.nodes).forEach(k=>{if(!seen.has(k))order.push(k);});
  // FIXO: caixas conectadas por setas
  const fixed=order.map((id,i)=>{const n=flow.nodes[id];
    const opts=n.opts?`<div class="ff-opts">${n.opts.map(o=>`<span class="ff-branch">${o.l} <b>→ ${flow.nodes[o.to]?(flow.nodes[o.to].type==='end'?'✔ ':'')+shortLabel(flow.nodes[o.to].t):o.to}</b></span>`).join("")}</div>`:'';
    return `<div class="ff-box ${n.type==='end'?'end':'q'}">
        <div class="ff-head"><span class="ff-num">${n.type==='end'?'✔':i+1}</span><span class="ff-tag">${n.type==='end'?'desfecho':'decisão'}</span></div>
        <div class="ff-text">${n.t}</div>${opts}
      </div>${i<order.length-1?'<div class="ff-arrow">↓</div>':''}`;}).join("");
  let cur=flow.start;
  box.innerHTML=`<div class="flow-panel"><div class="pane-bar">🗺️ Fluxograma (estrutura fixa)</div><div class="ff-chart">${fixed}</div></div>
    <div class="flow-panel pane-pink"><div class="pane-bar">🎯 Praticar passo a passo (opcional)</div><div id="${boxId}_it" class="ff-inter"></div></div>`;
  const it=document.getElementById(boxId+"_it");
  function drawIt(){const n=flow.nodes[cur];
    it.innerHTML=`<div class="flow-node ${n.type==='end'?'end':'q'}">${n.t}
      ${n.type==='q'&&n.opts?`<div class="flow-opts">${n.opts.map(o=>`<button data-to="${o.to}">${o.l}</button>`).join("")}</div>`:''}
      ${n.type==='end'?'':''}</div>
      <div style="margin-top:10px"><button class="flow-restart sm">↺ Reiniciar</button></div>`;
    it.querySelectorAll("[data-to]").forEach(b=>b.addEventListener("click",()=>{cur=b.dataset.to;drawIt();}));
    it.querySelectorAll(".flow-restart").forEach(b=>b.addEventListener("click",()=>{cur=flow.start;drawIt();}));
  }
  drawIt();
}
function shortLabel(t){t=t.replace(/<[^>]+>/g,"");return t.length>42?t.slice(0,40)+"…":t;}

/* ---------- helpers de seed diária ---------- */
function daySeed(){const d=new Date();return d.getFullYear()*1000+(d.getMonth()*31)+d.getDate();}
function seededPick(arr,seed,n){const out=[];const a=arr.slice();let s=seed;
  while(out.length<n && a.length){s=(s*9301+49297)%233280;const i=Math.floor((s/233280)*a.length);out.push(a.splice(i,1)[0]);}
  return out;}
function allQuestionsFlat(){const out=[];MODULES.forEach(m=>m.topics.forEach(t=>t.CONTENT.questions.forEach((q,i)=>out.push({q,mid:m.id,tid:t.id,qi:i,mod:m.t,top:t.t}))));return out;}
function allTopicCardsFlat(){const out=[];MODULES.forEach(m=>m.topics.forEach(t=>t.CONTENT.flashcards.forEach((f,i)=>out.push({id:"fc:"+t.id+":"+i,f,top:t.t,mod:m.t}))));return out;}
function allCardsForSRS(){const tc=allTopicCardsFlat();const uc=(S.cards||[]).map((c,i)=>({id:"uc:"+i,f:c,top:c.top||"Meu baralho",mod:"Criados por mim"}));return tc.concat(uc);}

  const c=document.getElementById("content");

function answerDiaQ(tid,qi,choice,btn){
  const t=findTopicById(tid); const q=t.CONTENT.questions[qi];

  parent.querySelector(".qexp").style.display="block";
  const key=tid+":"+qi; S.qSeen[key]=true;
  if(choice===q.correct){S.qRight[key]=true;addXP(12,"questão certa");}else addXP(4,"questão respondida");
  saveState();
}
